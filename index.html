<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Occupational Thinks · Biblioteca de Prompts</title>
  <style>
    :root {
      --brand:       #1a4f8a;
      --brand-light: #2e72c2;
      --brand-dim:   #e8f0fb;
      --accent:      #e8580d;
      --surface:     #ffffff;
      --bg:          #f4f6fb;
      --border:      #dde3ee;
      --text:        #1c2437;
      --muted:       #6b7894;
      --radius:      10px;
      --shadow:      0 2px 12px rgba(26,79,138,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    #app { display: grid; grid-template-rows: 64px 1fr; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden; }

    header {
      grid-column: 1 / -1;
      background: var(--brand); color: #fff;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); z-index: 10;
    }
    header .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -.3px; white-space: nowrap; }
    header .logo span { color: #90c0ff; }
    header .search-wrap { flex: 1; max-width: 480px; margin-left: auto; position: relative; }
    header .search-wrap input {
      width: 100%; padding: 8px 16px 8px 38px;
      border: none; border-radius: 20px;
      background: rgba(255,255,255,.15); color: #fff;
      font-size: .92rem; outline: none; transition: background .2s;
    }
    header .search-wrap input::placeholder { color: rgba(255,255,255,.6); }
    header .search-wrap input:focus { background: rgba(255,255,255,.25); }
    header .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .7; }

    aside {
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 20px 0;
    }
    aside h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0 20px 10px; }
    .cat-btn {
      width: 100%; text-align: left; background: none; border: none; cursor: pointer;
      padding: 10px 20px; font-size: .9rem; color: var(--text);
      display: flex; align-items: center; gap: 10px;
      border-left: 3px solid transparent; transition: background .15s, border-color .15s;
    }
    .cat-btn:hover { background: var(--brand-dim); }
    .cat-btn.active { background: var(--brand-dim); border-left-color: var(--brand-light); color: var(--brand); font-weight: 600; }
    .cat-btn .count { margin-left: auto; font-size: .75rem; background: var(--border); padding: 1px 7px; border-radius: 10px; color: var(--muted); }
    .cat-btn.active .count { background: var(--brand-light); color: #fff; }
    .cat-icon { font-size: 1.1rem; width: 22px; text-align: center; }

    main { overflow-y: auto; padding: 24px; }

    #status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: .85rem; color: var(--muted); }
    #status-bar .pill { padding: 3px 12px; border-radius: 12px; font-size: .78rem; font-weight: 600; }
    .pill-ok   { background: #d4edda; color: #1a6630; }
    .pill-err  { background: #fde8e3; color: #a12a0a; }
    .pill-load { background: #fff3cd; color: #856404; }

    #cat-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .cat-pill {
      padding: 6px 14px; border-radius: 20px; font-size: .82rem; font-weight: 600;
      cursor: pointer; border: 2px solid var(--border);
      background: var(--surface); color: var(--muted);
      transition: all .15s; white-space: nowrap;
    }
    .cat-pill:hover { border-color: var(--brand-light); color: var(--brand); }
    .cat-pill.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .cat-pill .pill-count { display: inline-block; margin-left: 5px; font-size: .72rem; opacity: .75; }

    #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; cursor: pointer;
      transition: box-shadow .2s, transform .15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .card-cat { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; color: var(--brand-light); }
    .card h3 { font-size: .97rem; font-weight: 700; line-height: 1.35; }
    .card p { font-size: .84rem; color: var(--muted); line-height: 1.5; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; justify-content: flex-end; }
    .tag { font-size: .72rem; padding: 2px 8px; border-radius: 8px; background: var(--brand-dim); color: var(--brand); font-weight: 600; }

    .state-msg { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: .95rem; }
    .state-msg svg { display: block; margin: 0 auto 16px; opacity: .3; }

    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,20,50,.45); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--surface); border-radius: 14px;
      width: 100%; max-width: 760px; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    #modal-header {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    }
    #modal-header h2 { font-size: 1.1rem; line-height: 1.4; flex: 1; }
    #modal-header .cat-badge {
      font-size: .73rem; font-weight: 700; text-transform: uppercase;
      background: var(--brand-dim); color: var(--brand);
      padding: 3px 10px; border-radius: 8px; white-space: nowrap;
    }
    #modal-close { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--muted); line-height: 1; padding: 0 0 0 8px; flex-shrink: 0; }
    #modal-close:hover { color: var(--text); }
    #modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 18px; }
    .section-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .section-content { font-size: .9rem; line-height: 1.65; color: var(--text); }
    #prompt-box {
      background: #f7f8fc; border: 1px solid var(--border); border-radius: 8px; padding: 16px;
      font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: .82rem; line-height: 2; white-space: pre-wrap; word-break: break-word;
      max-height: 380px; overflow-y: auto; color: #2a3550;
    }
    .prompt-field {
      display: inline-block;
      background: #fff8e1; border: 1.5px solid #f0a500;
      border-radius: 5px; padding: 2px 9px;
      font-family: inherit; font-size: inherit; color: #5a3a00;
      min-width: 320px; max-width: 560px; width: auto;
      outline: none; transition: border-color .15s, background .15s;
      vertical-align: baseline; line-height: 1.6;
    }
    .prompt-field:focus { border-color: var(--brand-light); background: #e8f0fb; color: var(--brand); }
    .prompt-field::placeholder { color: #c49a00; font-style: italic; }
    .fields-hint {
      font-size: .78rem; color: var(--muted);
      background: #fff3cd; border: 1px solid #ffe082;
      border-radius: 6px; padding: 6px 12px; margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .fields-hint.hidden { display: none; }
    #modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .btn { padding: 9px 20px; border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer; border: none; transition: background .2s, opacity .2s; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #c9d0e0; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: .85; }
    #copy-feedback { font-size: .8rem; color: #1a6630; align-self: center; opacity: 0; transition: opacity .3s; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c5cee0; border-radius: 3px; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Occupational <span>Thinks</span> · Prompts</div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Buscar prompt..." />
    </div>
  </header>

  <aside>
    <h2>Categorías</h2>
    <button class="cat-btn active" data-cat="all">
      <span class="cat-icon">📚</span> Todos los prompts
      <span class="count" id="count-all">0</span>
    </button>
    <div id="cat-list"></div>
  </aside>

  <main>
    <div id="status-bar">
      <span id="status-pill" class="pill pill-load">Cargando…</span>
      <span id="status-text">Conectando con Google Sheets…</span>
    </div>
    <div id="cat-pills"></div>
    <div id="cards"></div>
  </main>
</div>

<!-- Modal prompt -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div>
        <span id="m-cat" class="cat-badge"></span>
        <h2 id="m-title"></h2>
      </div>
      <button id="modal-close">×</button>
    </div>
    <div id="modal-body">
      <div>
        <div class="section-label">Propósito</div>
        <div class="section-content" id="m-purpose"></div>
      </div>
      <div>
        <div class="section-label">Cómo usar</div>
        <div class="section-content" id="m-usage"></div>
      </div>
      <div>
        <div class="section-label">Prompt completo</div>
        <div id="fields-hint" class="fields-hint hidden">✏️ Rellena los campos en amarillo y pulsa <strong>Copiar prompt listo</strong></div>
        <div id="prompt-box"></div>
      </div>
      <div id="m-notes-wrap">
        <div class="section-label">Notas y recomendaciones</div>
        <div class="section-content" id="m-notes"></div>
      </div>
    </div>
    <div id="modal-footer">
      <span id="copy-feedback">¡Copiado al portapapeles!</span>
      <button class="btn btn-secondary" id="modal-close-btn">Cerrar</button>
      <button class="btn btn-accent" id="copy-btn">Copiar prompt listo</button>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTbpeGHOLBtcRyRXgrCMe_ZsaWebQ6JHGyLhwNBrYeaNdYOBEH-g4S85Me_0LwOkyvovgovmfb5sx0I/pub?gid=0&single=true&output=csv';

const CAT_META = {
  'Análisis y síntesis':               { icon: '🔬' },
  'Búsqueda y gestión bibliográfica':  { icon: '📖' },
  'Escritura y redacción académica':   { icon: '✍️' },
  'Específicos de Terapia Ocupacional':{ icon: '♿' },
  'Metodología':                       { icon: '⚙️' },
  'Gestión del grupo de investigación':{ icon: '👥' },
  'Difusión y transferencia':          { icon: '📣' },
};
// Precompute normalised keys for matching
const CAT_KEYS_NORM = Object.keys(CAT_META).map(k => ({ key: k, norm: k.normalize('NFC').toLowerCase().trim() }));

function matchCat(raw) {
  const s = raw.normalize('NFC').trim();
  // exact
  if (CAT_META[s]) return s;
  // case-insensitive + NFC
  const low = s.toLowerCase();
  const found = CAT_KEYS_NORM.find(c => c.norm === low);
  return found ? found.key : s;
}

let allPrompts = [];
let filtered   = [];
let activeCat  = 'all';

const cards       = document.getElementById('cards');
const catList     = document.getElementById('cat-list');
const countAll    = document.getElementById('count-all');
const statusPill  = document.getElementById('status-pill');
const statusText  = document.getElementById('status-text');
const searchInput = document.getElementById('search-input');
const modalOverlay= document.getElementById('modal-overlay');

// ── CSV parser ────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQ = false; }
      else cell += ch;
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (ch === '\r') { /* skip */ }
      else cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ── Load ──────────────────────────────────────────────────────────
async function loadSheet() {
  setStatus('load', 'Cargando desde Google Sheets…');
  const url = CSV_URL + '&_t=' + Date.now();
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error('La hoja está vacía.');

    // Detect columns from header
    const header = rows[0].map(h => h.normalize('NFC').trim().toLowerCase());
    const col = (candidates) => {
      for (const c of candidates) {
        const i = header.findIndex(h => h.includes(c));
        if (i >= 0) return i;
      }
      return -1;
    };
    const iCat     = col(['categor'])             >= 0 ? col(['categor'])             : 0;
    const iTitle   = col(['título','titulo','title','nombre']) >= 0 ? col(['título','titulo','title','nombre']) : 1;
    const iPurpose = col(['propós','propos','purpose','descripci']) >= 0 ? col(['propós','propos','purpose','descripci']) : 2;
    const iUsage   = col(['cómo','como usar','uso','usage','instruc']) >= 0 ? col(['cómo','como usar','uso','usage','instruc']) : 3;
    const iPrompt  = col(['prompt','texto','text']) >= 0 ? col(['prompt','texto','text']) : 4;
    const iNotes   = col(['notas','notes','recom'])  >= 0 ? col(['notas','notes','recom'])  : 5;

    const data = rows.slice(1)
      .filter(r => r.some(c => c.trim()))
      .map(r => ({
        cat:     matchCat(r[iCat]     || ''),
        title:   (r[iTitle]   || '').trim(),
        purpose: (r[iPurpose] || '').trim(),
        usage:   (r[iUsage]   || '').trim(),
        prompt:  (r[iPrompt]  || '').trim(),
        notes:   (r[iNotes]   || '').trim(),
      }))
      .filter(p => p.title);

    allPrompts = data;
    setStatus('ok', `${data.length} prompts cargados correctamente`);
    renderSidebar();
    applyFilters();
  } catch(e) {
    setStatus('err', `Error al cargar: ${e.message}`);
    cards.innerHTML = `<div class="state-msg"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>No se pudo cargar el contenido.</div>`;
  }
}

function setStatus(type, msg) {
  statusPill.className = `pill pill-${type}`;
  statusPill.textContent = type === 'ok' ? '✓ Conectado' : type === 'err' ? '✗ Error' : '⟳ Cargando';
  statusText.textContent = msg;
}

// ── Sidebar + pills ───────────────────────────────────────────────
function renderSidebar() {
  catList.innerHTML = '';
  const pillsEl = document.getElementById('cat-pills');
  pillsEl.innerHTML = '';

  const allPill = makePill('all', '📚', 'Todos', allPrompts.length);
  pillsEl.appendChild(allPill);

  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const n = allPrompts.filter(p => p.cat === cat).length;

    // sidebar
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat === cat ? ' active' : '');
    btn.dataset.cat = cat;
    btn.innerHTML = `<span class="cat-icon">${meta.icon}</span> ${cat} <span class="count">${n}</span>`;
    btn.onclick = () => setCat(cat);
    catList.appendChild(btn);

    // pill
    pillsEl.appendChild(makePill(cat, meta.icon, cat, n));
  });

  countAll.textContent = allPrompts.length;
}

function makePill(cat, icon, label, n) {
  const pill = document.createElement('button');
  pill.className = 'cat-pill' + (activeCat === cat ? ' active' : '');
  pill.dataset.cat = cat;
  pill.innerHTML = `${icon} ${label} <span class="pill-count">${n}</span>`;
  pill.onclick = () => setCat(cat);
  return pill;
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilters();
}

// ── Filter + render ───────────────────────────────────────────────
function applyFilters() {
  const q = searchInput.value.trim().toLowerCase();
  filtered = allPrompts.filter(p => {
    const matchCat = activeCat === 'all' || p.cat === activeCat;
    const matchQ   = !q || [p.title, p.cat, p.purpose, p.prompt].join(' ').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderCards();
}

function renderCards() {
  if (!filtered.length) {
    cards.innerHTML = `<div class="state-msg"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No se encontraron prompts.</div>`;
    return;
  }
  cards.innerHTML = '';
  filtered.forEach(p => {
    const meta = CAT_META[p.cat] || { icon: '📁' };
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-cat">${meta.icon} ${p.cat}</div>
      <h3>${p.title}</h3>
      <p>${p.purpose || 'Sin descripción.'}</p>
      <div class="card-footer"><span class="tag">Ver prompt →</span></div>`;
    el.onclick = () => openModal(p);
    cards.appendChild(el);
  });
}

// ── Interactive prompt rendering ──────────────────────────────────
function renderInteractivePrompt(promptText) {
  const box = document.getElementById('prompt-box');
  const hint = document.getElementById('fields-hint');
  box.innerHTML = '';

  const PLACEHOLDER = /(\[[^\]]+\])/g;
  const hasFields = PLACEHOLDER.test(promptText);
  hint.classList.toggle('hidden', !hasFields);
  PLACEHOLDER.lastIndex = 0;

  const parts = promptText.split(PLACEHOLDER);
  parts.forEach(part => {
    if (/^\[[^\]]+\]$/.test(part)) {
      const label = part.slice(1, -1);
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = label;
      input.title = label;
      input.className = 'prompt-field';
      // Auto-size as user types
      input.addEventListener('input', () => {
        input.style.width = Math.max(90, Math.min(260, input.value.length * 8 + 20)) + 'px';
      });
      box.appendChild(input);
    } else {
      box.appendChild(document.createTextNode(part));
    }
  });
}

function assemblePrompt() {
  const box = document.getElementById('prompt-box');
  let result = '';
  box.childNodes.forEach(node => {
    if (node.nodeType === Node.TEXT_NODE) {
      result += node.textContent;
    } else if (node.tagName === 'INPUT') {
      result += node.value.trim() !== '' ? node.value : '[' + node.placeholder + ']';
    }
  });
  return result;
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(p) {
  document.getElementById('m-cat').textContent     = p.cat;
  document.getElementById('m-title').textContent   = p.title;
  document.getElementById('m-purpose').textContent = p.purpose || '—';
  document.getElementById('m-usage').textContent   = p.usage   || '—';
  renderInteractivePrompt(p.prompt || '');
  const notesWrap = document.getElementById('m-notes-wrap');
  if (p.notes) {
    document.getElementById('m-notes').textContent = p.notes;
    notesWrap.style.display = '';
  } else {
    notesWrap.style.display = 'none';
  }
  modalOverlay.classList.add('open');
}
function closeModal() { modalOverlay.classList.remove('open'); }

document.getElementById('modal-close').onclick     = closeModal;
document.getElementById('modal-close-btn').onclick = closeModal;
modalOverlay.onclick = e => { if (e.target === modalOverlay) closeModal(); };

document.getElementById('copy-btn').onclick = () => {
  const text = assemblePrompt();
  navigator.clipboard.writeText(text).then(() => {
    const fb = document.getElementById('copy-feedback');
    fb.style.opacity = '1';
    setTimeout(() => fb.style.opacity = '0', 2200);
  });
};

document.querySelector('.cat-btn[data-cat="all"]').onclick = () => setCat('all');
searchInput.addEventListener('input', applyFilters);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadSheet();
</script>
</body>
</html>
